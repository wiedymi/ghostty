name: Build libghostty-vt aarch64-linux-musl

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build libghostty-vt
        run: |
          nix develop -c zig build -Demit-lib-vt \
            -Dtarget=aarch64-linux-musl \
            -Dsimd=false

      - name: Upload libghostty-vt artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libghostty-vt-aarch64-linux-musl
          path: |
            zig-out/lib/libghostty-vt.a
            zig-out/include/**
